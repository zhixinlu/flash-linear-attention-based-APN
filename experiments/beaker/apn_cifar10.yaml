# Beaker experiment spec for APN seq-CIFAR-10
# Usage: beaker experiment create experiments/beaker/apn_cifar10.yaml
#
# Before running:
#   1. Build & push image:  beaker image create --name apn-cifar10 --workspace ai1/aihub-nd-scalempn .
#   2. Store wandb key:     beaker secret write WANDB_API_KEY <your-key> --workspace ai1/aihub-nd-scalempn
#   3. Submit:              beaker experiment create experiments/beaker/apn_cifar10.yaml

version: v2
description: "APN vs DeltaNet seq-CIFAR-10 benchmark"
tasks:
  - name: train-apn
    image:
      beaker: ai1/aihub-nd-scalempn/apn-cifar10     # <-- your Beaker image name
    command: ["python", "experiments/seq_cifar.py"]
    arguments:
      - "--model"
      - "apn"
      - "--n-layers"
      - "10"
      - "--d-hidden"
      - "173"
      - "--apn-lam"
      - "0.999"
      - "--apn-eta"
      - "1.0"
      - "--epochs"
      - "200"
      - "--batch-size"
      - "64"
      - "--lr"
      - "1e-3"
      - "--scalar-lr"
      - "1e-3"
      - "--wandb-project"
      - "seq-cifar10-apn"
      - "--wandb-name"
      - "apn_L10_D173_beaker"
    env_vars:
      - name: WANDB_API_KEY
        secret: WANDB_API_KEY
    result:
      path: /results
    resources:
      gpu_count: 1
    context:
      cluster: ai1/octo.hub-gcp-h200
      priority: normal
      preemptible: true
