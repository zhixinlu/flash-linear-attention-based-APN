# Beaker experiment spec for APN seq-CIFAR-10 (direct submission, no Gantry)
#
# Usage (from any machine with Beaker CLI):
#   beaker experiment create experiments/beaker/apn_cifar10.yaml
#
# Before running:
#   1. Build & push image (from Mac):
#        docker build --platform linux/amd64 -t apn-cifar10 .
#        beaker image create apn-cifar10 --name apn-cifar10-v2 --workspace ai1/aihub-nd-scalempn
#   2. Store wandb key:  beaker secret write WANDB_API_KEY <your-key> --workspace ai1/aihub-nd-scalempn
#   3. Submit:           beaker experiment create experiments/beaker/apn_cifar10.yaml

version: v2
description: "APN seq-CIFAR-10 on H200"
tasks:
  - name: train-apn
    image:
      beaker: zhixin-lu/apn-cifar10-v3
    command: ["python", "experiments/seq_cifar.py"]
    arguments:
      - "--model"
      - "apn"
      - "--n-layers"
      - "10"
      - "--d-hidden"
      - "173"
      - "--apn-lam"
      - "0.999"
      - "--apn-eta"
      - "1.0"
      - "--epochs"
      - "200"
      - "--batch-size"
      - "64"
      - "--lr"
      - "1e-3"
      - "--scalar-lr"
      - "1e-3"
      - "--data-dir"
      - "/data"
      - "--save-dir"
      - "/results"
      - "--wandb-project"
      - "seq-cifar10-apn"
      - "--wandb-name"
      - "apn_L10_D173_beaker"
    datasets:
      - source:
          beaker: zhixin-lu/cifar10
        mountPath: /data
    envVars:
      - name: WANDB_API_KEY
        secret: WANDB_API_KEY
    result:
      path: /results
    resources:
      gpuCount: 1
    context:
      cluster: ai1/octo.hub-gcp-h200
      priority: low
      preemptible: true
